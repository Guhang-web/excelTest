<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Level Test | SBS아카데미 컴퓨터아트학원</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <img src="./img/main.png" alt="SBS아카데미 컴퓨터아트학원" class="banner-img">
        </header>

        <section id="intro-section" class="screen">
            <h1 class="main-title">Excel Level Test</h1>
            <div class="intro-desc">
                <p>나의 엑셀 실력은 어느 정도일까? </p>
                <p class="warning"><strong>※</strong> 정확한 실력 진단을 위해, 정답을 모르실 경우 꼭 <strong>'모름'</strong>을 체크해 주세요.</p>
            </div>
            <button id="start-btn" class="btn-primary">시작하기</button>
        </section>

        <section id="quiz-section" class="screen" style="display: none;">
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
                <span id="progress-text">1 / 7</span>
            </div>

            <div id="question-container">
                <h2 id="question-text" class="question-text">질문 내용이 여기에 들어갑니다.</h2>
                <div id="options-container" class="options-grid">
                    </div>
            </div>

            <div class="nav-buttons">
                <button id="prev-btn" class="btn-secondary" disabled>이전</button>
                <button id="next-btn" class="btn-primary" disabled>다음</button>
            </div>
        </section>

        <section id="result-section" class="screen" style="display: none;">
            <div class="result-header">
                <h2 id="result-score">총 7문제 중 0문제 정답!</h2>
                <button id="show-review-btn" class="btn-small">상세 결과 확인하기</button>
            </div>
            
            <div id="level-card" class="level-card">
                <h3 id="level-title">엑셀 새싹 🌱</h3>
                <p id="level-desc">기초부터 차근차근! 엑셀의 기본 원리를 잡는 상담이 필요해요.<br/>
                    (실전OA2과정 추천)</p>
            </div>

            <button id="restart-btn" class="btn-outline">처음으로 돌아가기</button>

            <div id="review-section" class="review-section" style="display: none;">
                <hr>
                <h3>오답 노트 (틀린 문제)</h3>
                <div id="review-list">
                    </div>
                <button id="close-review-btn" class="btn-secondary">닫기</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
